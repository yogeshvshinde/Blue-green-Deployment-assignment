version: "3.8"

services:

  mongo:
    image: mongo:7
    container_name: mongo

    ports:
      - "27017:27017"

  backend:
    build: ./backend

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/bluegreen

    depends_on:
      - mongo

  frontend-blue:
    build: ./frontend-blue

    ports:
      - "3100:3100"

    environment:
      PORT: 3100

    depends_on:
      - backend

  frontend-green:
    build: ./frontend-green

    ports:
      - "3200:3200"

    environment:
      PORT: 3200

    depends_on:
      - backend